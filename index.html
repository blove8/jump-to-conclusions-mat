<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jump to Conclusions Mat™</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      color: #f5c842;
      text-shadow: 0 0 20px rgba(245,200,66,0.4);
    }

    .tagline {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 2rem;
      font-style: italic;
      text-align: center;
    }

    .mat-wrapper {
      position: relative;
      width: 100%;
      max-width: 680px;
    }

    .mat {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      background: #5c3a1e;
      border: 6px solid #3d2410;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 2px 8px rgba(255,200,100,0.1);
      aspect-ratio: 4/3;
    }

    .zone {
      background: #d4a853;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-size: clamp(0.55rem, 1.4vw, 0.78rem);
      font-weight: bold;
      color: #2a1a08;
      border: 2px solid #b8892e;
      cursor: default;
      transition: background 0.15s, transform 0.15s;
      line-height: 1.3;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .zone.active {
      background: #ff4d4d;
      color: #fff;
      border-color: #cc0000;
      transform: scale(1.06);
      z-index: 2;
      box-shadow: 0 0 18px rgba(255,50,50,0.8);
    }

    .zone.active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.25), transparent 70%);
      animation: pulse-ring 0.6s ease-out forwards;
    }

    @keyframes pulse-ring {
      from { opacity: 1; transform: scale(0.5); }
      to   { opacity: 0; transform: scale(1.5); }
    }

    .person {
      position: absolute;
      font-size: 2.2rem;
      pointer-events: none;
      transition: left 0.5s cubic-bezier(0.22,1,0.36,1),
                  top  0.5s cubic-bezier(0.22,1,0.36,1);
      z-index: 10;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
      transform: translate(-50%, -50%);
    }

    .person.jumping {
      animation: jump-anim 0.5s ease-out;
    }

    @keyframes jump-anim {
      0%   { transform: translate(-50%, -50%) scale(1); }
      40%  { transform: translate(-50%, calc(-50% - 30px)) scale(1.2) rotate(-8deg); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .btn-jump {
      background: #f5c842;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 3rem;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 16px rgba(245,200,66,0.4);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .btn-jump:hover { background: #ffd34d; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,200,66,0.5); }
    .btn-jump:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(245,200,66,0.3); }
    .btn-jump:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .conclusion-display {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .conclusion-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
    }

    .conclusion-text {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #ff6b6b;
      font-weight: bold;
      margin-top: 0.4rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      max-width: 500px;
      line-height: 1.4;
    }

    .conclusion-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .jump-count {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.5rem;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Jump to Conclusions Mat™</h1>
  <p class="tagline">"You could jump to a conclusion!" — Tom Smykowski</p>

  <div class="mat-wrapper">
    <div class="mat" id="mat">
      <!-- zones injected by JS -->
    </div>
    <div class="person" id="person">🧍</div>
  </div>

  <div class="controls">
    <button class="btn-jump" id="jumpBtn">JUMP!</button>
    <div class="conclusion-display">
      <div class="conclusion-label" id="conclusionLabel"></div>
      <div class="conclusion-text" id="conclusionText"></div>
      <div class="jump-count" id="jumpCount"></div>
    </div>
  </div>

  <footer>Patent Pending · Initech R&amp;D Division · Est. 1999</footer>

  <script>
    const conclusions = [
      "It's Someone\nElse's Fault",
      "We Need\nMore Meetings",
      "Blame\nThe Intern",
      "That's Not\nMy Job",
      "Ship It\nAnyway",
      "It Worked On\nMy Machine",
      "Reorg Will\nFix It",
      "Let's Form\na Committee",
      "We've Always\nDone It This Way",
      "Not Enough\nBudget",
      "Someone Else\nIs Handling It",
      "The Users\nAre Wrong",
    ];

    const mat = document.getElementById('mat');
    const person = document.getElementById('person');
    const jumpBtn = document.getElementById('jumpBtn');
    const conclusionText = document.getElementById('conclusionText');
    const conclusionLabel = document.getElementById('conclusionLabel');
    const jumpCountEl = document.getElementById('jumpCount');

    let jumpCount = 0;
    let currentZone = null;

    // Build zones
    conclusions.forEach((text, i) => {
      const zone = document.createElement('div');
      zone.className = 'zone';
      zone.dataset.index = i;
      zone.innerHTML = text.replace(/\n/g, '<br>');
      mat.appendChild(zone);
    });

    function getZoneCenter(zoneEl) {
      const matRect = mat.getBoundingClientRect();
      const zoneRect = zoneEl.getBoundingClientRect();
      return {
        x: zoneRect.left - matRect.left + zoneRect.width / 2,
        y: zoneRect.top  - matRect.top  + zoneRect.height / 2,
      };
    }

    function placePerson(zoneEl, animate) {
      const center = getZoneCenter(zoneEl);
      person.style.left = center.x + 'px';
      person.style.top  = center.y + 'px';
      if (animate) {
        person.classList.remove('jumping');
        void person.offsetWidth;
        person.classList.add('jumping');
      }
    }

    // Start person on first zone without animation
    window.addEventListener('load', () => {
      const firstZone = mat.querySelector('.zone');
      placePerson(firstZone, false);
    });

    jumpBtn.addEventListener('click', () => {
      jumpBtn.disabled = true;

      // Clear previous active
      if (currentZone) currentZone.classList.remove('active');
      conclusionText.classList.remove('visible');

      const zones = mat.querySelectorAll('.zone');
      let remaining = 12;
      let picked = Math.floor(Math.random() * conclusions.length);

      // Quick hop animation across random zones before landing
      let hops = 0;
      const totalHops = 5 + Math.floor(Math.random() * 4);
      const hopInterval = setInterval(() => {
        const tempZone = zones[Math.floor(Math.random() * zones.length)];
        placePerson(tempZone, hops % 2 === 0);
        hops++;
        if (hops >= totalHops) {
          clearInterval(hopInterval);

          // Final landing
          const landedZone = zones[picked];
          placePerson(landedZone, true);
          landedZone.classList.add('active');
          currentZone = landedZone;
          jumpCount++;

          conclusionLabel.textContent = 'You have concluded:';
          conclusionText.textContent = conclusions[picked].replace(/\n/g, ' ');

          setTimeout(() => {
            conclusionText.classList.add('visible');
            jumpCountEl.textContent = `${jumpCount} conclusion${jumpCount !== 1 ? 's' : ''} jumped to`;
            jumpBtn.textContent = 'JUMP AGAIN!';
            jumpBtn.disabled = false;
          }, 150);
        }
      }, 100);
    });
  </script>
</body>
</html>
