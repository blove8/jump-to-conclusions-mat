<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jump to Conclusions Mat™</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      color: #f5c842;
      text-shadow: 0 0 20px rgba(245,200,66,0.4);
    }

    .tagline {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 2rem;
      font-style: italic;
      text-align: center;
    }

    .mat-wrapper {
      position: relative;
      width: 100%;
      max-width: 680px;
    }

    .mat {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      background: #5c3a1e;
      border: 6px solid #3d2410;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 2px 8px rgba(255,200,100,0.1);
      aspect-ratio: 4/3;
    }

    .zone {
      background: #d4a853;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-size: clamp(0.55rem, 1.4vw, 0.78rem);
      font-weight: bold;
      color: #2a1a08;
      border: 2px solid #b8892e;
      cursor: default;
      transition: background 0.15s, transform 0.15s;
      line-height: 1.3;
      user-select: none;
      position: relative;
      overflow: hidden;
      white-space: pre-line;
    }

    .zone.active {
      background: #ff4d4d;
      color: #fff;
      border-color: #cc0000;
      transform: scale(1.06);
      z-index: 2;
      box-shadow: 0 0 18px rgba(255,50,50,0.8);
    }

    .zone.active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.25), transparent 70%);
      animation: pulse-ring 0.6s ease-out forwards;
    }

    .zone::before {
      content: attr(data-hit);
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: 0.62rem;
      color: rgba(0, 0, 0, 0.55);
      font-weight: bold;
    }

    @keyframes pulse-ring {
      from { opacity: 1; transform: scale(0.5); }
      to   { opacity: 0; transform: scale(1.5); }
    }

    .person {
      position: absolute;
      font-size: 2.2rem;
      pointer-events: none;
      transition: left 0.5s cubic-bezier(0.22,1,0.36,1), top  0.5s cubic-bezier(0.22,1,0.36,1);
      z-index: 10;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
      transform: translate(-35%, -80%);
    }

    .person.jumping {
      animation: jump-anim 0.5s ease-out;
    }

    @keyframes jump-anim {
      0%   { transform: translate(-35%, -80%) scale(1); }
      40%  { transform: translate(-35%, calc(-80% - 30px)) scale(1.2) rotate(-8deg); }
      100% { transform: translate(-35%, -80%) scale(1); }
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 680px;
    }

    .button-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-jump {
      background: #f5c842;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 3rem;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 16px rgba(245,200,66,0.4);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .btn-jump:hover { background: #ffd34d; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,200,66,0.5); }
    .btn-jump:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(245,200,66,0.3); }
    .btn-jump:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: #c18f39;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.1rem;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(193,143,57,0.35);
    }

    .btn-secondary:hover { filter: brightness(1.06); }
    .btn-secondary:disabled { opacity: 0.55; cursor: not-allowed; }

    .feature-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 0.85rem;
      width: 100%;
      display: grid;
      gap: 0.7rem;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 0.5rem;
    }

    .feature-line {
      font-size: 0.85rem;
      color: #ddd;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .custom-add {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .custom-add input {
      flex: 1;
      min-width: 220px;
      border: 1px solid #7d6f4d;
      border-radius: 8px;
      padding: 0.55rem 0.7rem;
      background: #231a0f;
      color: #f3e5c4;
    }

    .status-line {
      font-size: 0.8rem;
      color: #9ea4bf;
      text-align: center;
      min-height: 1.2em;
    }

    .conclusion-display {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .conclusion-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
    }

    .conclusion-text {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #ff6b6b;
      font-weight: bold;
      margin-top: 0.4rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      max-width: 500px;
      line-height: 1.4;
    }

    .conclusion-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .jump-count {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.5rem;
    }

    .mat-wrapper.chaos-shake {
      animation: chaos-shake 0.22s linear 2;
    }

    @keyframes chaos-shake {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(1px, -1px) rotate(-1deg); }
      50% { transform: translate(-1px, 1px) rotate(1deg); }
      75% { transform: translate(1px, 1px) rotate(0deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    .confetti-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      animation: confetti-fall 1.3s ease-out forwards;
    }

    @keyframes confetti-fall {
      from { opacity: 1; transform: translateY(0) rotate(0deg); }
      to { opacity: 0; transform: translateY(220px) rotate(320deg); }
    }

    .config-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      width: 100%;
    }

    .config-panel > summary {
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: bold;
      color: #f5c842;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .config-panel > summary::-webkit-details-marker { display: none; }

    .config-panel > summary::after {
      content: '▸';
      transition: transform 0.2s;
      color: #c18f39;
    }

    .config-panel[open] > summary::after {
      transform: rotate(90deg);
    }

    .config-body {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.7rem 1rem;
      margin-top: 0.85rem;
    }

    .config-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.78rem;
      color: #ddd;
    }

    .config-row label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
    }

    .config-row .config-value {
      color: #f5c842;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
    }

    .config-row input[type="range"] {
      width: 100%;
      accent-color: #d4a853;
    }

    .config-row input[type="number"],
    .config-row input[type="text"] {
      width: 100%;
      border: 1px solid #7d6f4d;
      border-radius: 6px;
      padding: 0.4rem 0.55rem;
      background: #231a0f;
      color: #f3e5c4;
      font-family: inherit;
      font-size: 0.85rem;
    }

    .config-footer {
      margin-top: 0.85rem;
      display: flex;
      justify-content: flex-end;
    }

    .config-panel .feature-panel {
      background: transparent;
      border: none;
      padding: 0;
      margin-top: 0.85rem;
    }

    .audio-diag {
      margin-top: 1rem;
      font-size: 0.72rem;
      color: #888;
      font-family: 'Courier New', monospace;
      text-align: center;
      letter-spacing: 0.03em;
      min-height: 1em;
    }

    .audio-diag .ok { color: #6fcf97; }
    .audio-diag .warn { color: #f2c94c; }
    .audio-diag .bad { color: #eb5757; }

    footer {
      margin-top: 3rem;
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Jump to Conclusions Mat™</h1>
  <p class="tagline">"You could jump to a conclusion!" - Tom Smykowski</p>

  <div class="mat-wrapper">
    <div class="mat" id="mat">
      <!-- zones injected by JS -->
    </div>
    <div class="person" id="person">🧍</div>
    <div class="confetti-layer" id="confettiLayer"></div>
  </div>

  <div class="controls">
    <div class="button-row">
      <button class="btn-jump" id="jumpBtn">JUMP!</button>
      <button class="btn-secondary" id="autoFiveBtn">AUTO x5</button>
      <button class="btn-secondary" id="resetBtn">RESET STATS</button>
    </div>

    <div class="conclusion-display">
      <div class="conclusion-label" id="conclusionLabel"></div>
      <div class="conclusion-text" id="conclusionText" aria-live="polite" aria-atomic="true"></div>
      <div class="jump-count" id="jumpCount"></div>
    </div>

    <details class="config-panel" id="settingsPanel">
      <summary>Settings</summary>
      <div class="feature-panel">
        <div class="feature-grid">
          <label class="feature-line"><input type="checkbox" id="chaosMode"> Chaos Mode (extra wild hops)</label>
          <label class="feature-line"><input type="checkbox" id="narratorMode"> Narrator Mode (reads conclusion)</label>
          <label class="feature-line"><input type="checkbox" id="soundMode" checked> Boing Sound FX</label>
          <label class="feature-line"><input type="checkbox" id="internBiasMode"> Intern Blame Bias</label>
        </div>
        <div class="custom-add">
          <input id="customConclusionInput" maxlength="40" placeholder="Add a custom dumb conclusion..." aria-label="Custom conclusion">
          <button class="btn-secondary" id="addCustomBtn">ADD TO MAT</button>
        </div>
        <div class="status-line" id="statsLine"></div>
      </div>
    </details>

    <details class="config-panel" id="configPanel">
      <summary>Config</summary>
      <div class="config-body">
        <div class="config-row">
          <label>Hop count base <span class="config-value" id="hopCountBaseValue"></span></label>
          <input type="range" id="cfgHopCountBase" min="1" max="20" step="1">
        </div>
        <div class="config-row">
          <label>Hop interval (ms) <span class="config-value" id="hopIntervalValue"></span></label>
          <input type="range" id="cfgHopInterval" min="30" max="300" step="10">
        </div>
        <div class="config-row">
          <label>Tile cooldown (turns) <span class="config-value" id="tileCooldownValue"></span></label>
          <input type="range" id="cfgTileCooldown" min="0" max="10" step="1">
        </div>
        <div class="config-row">
          <label>Intern bias chance <span class="config-value" id="internBiasChanceValue"></span></label>
          <input type="range" id="cfgInternBiasChance" min="0" max="1" step="0.05">
        </div>
        <div class="config-row">
          <label>Confetti chance <span class="config-value" id="confettiChanceValue"></span></label>
          <input type="range" id="cfgConfettiChance" min="0" max="1" step="0.05">
        </div>
        <div class="config-row">
          <label>Narrator rate <span class="config-value" id="narratorRateValue"></span></label>
          <input type="range" id="cfgNarratorRate" min="0.5" max="1.5" step="0.05">
        </div>
        <div class="config-row">
          <label>Narrator pitch <span class="config-value" id="narratorPitchValue"></span></label>
          <input type="range" id="cfgNarratorPitch" min="0.5" max="1.5" step="0.05">
        </div>
        <div class="config-row">
          <label>Person emoji</label>
          <input type="text" id="cfgPersonEmoji" maxlength="4">
        </div>
      </div>
      <div class="config-footer">
        <button class="btn-secondary" id="restoreDefaultsBtn">RESTORE DEFAULTS</button>
      </div>
    </details>

    <div class="audio-diag" id="audioDiag" aria-live="polite"></div>
  </div>

  <footer>Patent Pending - Initech R&amp;D Division - Est. 1999</footer>

  <script>
    const conclusions = [
      "It's Someone\nElse's Fault",
      "We Need\nMore Meetings",
      "Blame\nThe Intern",
      "That's Not\nMy Job",
      "Ship It\nAnyway",
      "It Worked On\nMy Machine",
      "Reorg Will\nFix It",
      "Let's Form\na Committee",
      "We've Always\nDone It This Way",
      "Not Enough\nBudget",
      "Someone Else\nIs Handling It",
      "The Users\nAre Wrong",
    ];

    const mat = document.getElementById('mat');
    const matWrapper = document.querySelector('.mat-wrapper');
    const person = document.getElementById('person');
    const confettiLayer = document.getElementById('confettiLayer');
    const jumpBtn = document.getElementById('jumpBtn');
    const autoFiveBtn = document.getElementById('autoFiveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const chaosMode = document.getElementById('chaosMode');
    const narratorMode = document.getElementById('narratorMode');
    const soundMode = document.getElementById('soundMode');
    const internBiasMode = document.getElementById('internBiasMode');
    const customConclusionInput = document.getElementById('customConclusionInput');
    const addCustomBtn = document.getElementById('addCustomBtn');
    const statsLine = document.getElementById('statsLine');
    const conclusionText = document.getElementById('conclusionText');
    const conclusionLabel = document.getElementById('conclusionLabel');
    const jumpCountEl = document.getElementById('jumpCount');

    let jumpCount = 0;
    let currentZone = null;
    let lastPicked = -1;
    let isJumping = false;
    const lastLandedTurnByIndex = new Array(conclusions.length).fill(-Infinity);
    const blameCounts = new Array(conclusions.length).fill(0);

    const CONFIG_STORAGE_KEY = 'jtcmat.config.v1';
    const CONFIG_DEFAULTS = Object.freeze({
      hopCountBase: 5,
      hopIntervalMs: 100,
      tileCooldownTurns: 3,
      internBiasChance: 0.65,
      confettiChance: 0.18,
      narratorRate: 0.95,
      narratorPitch: 0.85,
      personEmoji: '🧍',
    });
    const config = { ...CONFIG_DEFAULTS };

    const CONFIG_SCHEMA = {
      hopCountBase:       { el: 'cfgHopCountBase',      value: 'hopCountBaseValue',      type: 'int',   min: 1,   max: 20  },
      hopIntervalMs:      { el: 'cfgHopInterval',       value: 'hopIntervalValue',       type: 'int',   min: 30,  max: 300 },
      tileCooldownTurns:  { el: 'cfgTileCooldown',      value: 'tileCooldownValue',      type: 'int',   min: 0,   max: 10  },
      internBiasChance:   { el: 'cfgInternBiasChance',  value: 'internBiasChanceValue',  type: 'float', min: 0,   max: 1,   decimals: 2 },
      confettiChance:     { el: 'cfgConfettiChance',    value: 'confettiChanceValue',    type: 'float', min: 0,   max: 1,   decimals: 2 },
      narratorRate:       { el: 'cfgNarratorRate',      value: 'narratorRateValue',      type: 'float', min: 0.5, max: 1.5, decimals: 2 },
      narratorPitch:      { el: 'cfgNarratorPitch',     value: 'narratorPitchValue',     type: 'float', min: 0.5, max: 1.5, decimals: 2 },
      personEmoji:        { el: 'cfgPersonEmoji',       type: 'string', maxLength: 4 },
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function loadConfig() {
      try {
        const raw = localStorage.getItem(CONFIG_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        for (const key of Object.keys(CONFIG_DEFAULTS)) {
          if (parsed[key] === undefined) continue;
          const spec = CONFIG_SCHEMA[key];
          if (spec.type === 'int')        config[key] = clamp(Math.round(Number(parsed[key])), spec.min, spec.max);
          else if (spec.type === 'float') config[key] = clamp(Number(parsed[key]), spec.min, spec.max);
          else if (spec.type === 'string') {
            const str = String(parsed[key]).slice(0, spec.maxLength);
            if (str.length > 0) config[key] = str;
          }
        }
      } catch (_) {
        // Corrupt storage — silently fall back to defaults.
      }
    }

    function saveConfig() {
      try {
        localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(config));
      } catch (_) {
        // Storage may be disabled; changes stay in-memory.
      }
    }

    function randomFrom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function updateStatsLine() {
      const maxHits = Math.max(...blameCounts);
      if (maxHits <= 0) {
        statsLine.textContent = 'No hot takes yet. Jump to begin your legacy.';
        return;
      }
      const hottestIndex = blameCounts.findIndex((value) => value === maxHits);
      const hottestLabel = conclusions[hottestIndex].replace(/\n/g, ' ');
      statsLine.textContent = `Most blamed zone: ${hottestLabel} (${maxHits} hits)`;
    }

    let sharedAudioCtx = null;
    let audioUnlocked = false;
    let speechPrimed = false;
    let lastBoingAttempt = null;
    let lastSpeakAttempt = null;
    const audioDiag = document.getElementById('audioDiag');

    function renderAudioDiag() {
      if (!audioDiag) return;
      const ctxState = sharedAudioCtx ? sharedAudioCtx.state : 'none';
      const ctxClass = ctxState === 'running' ? 'ok' : (ctxState === 'suspended' ? 'warn' : 'bad');
      const unlockClass = audioUnlocked ? 'ok' : 'warn';
      const speechHas = 'speechSynthesis' in window;
      const speechClass = speechPrimed ? 'ok' : (speechHas ? 'warn' : 'bad');
      const silentClass = silentPlayed ? 'ok' : 'warn';
      const voiceCount = speechHas ? (window.speechSynthesis.getVoices() || []).length : 0;
      const voicesClass = voiceCount > 0 ? 'ok' : 'warn';
      const parts = [
        `ctx:<span class="${ctxClass}">${ctxState}</span>`,
        `unlocked:<span class="${unlockClass}">${audioUnlocked}</span>`,
        `silent:<span class="${silentClass}">${silentPlayed ? 'played' : 'no'}</span>`,
        `speech:<span class="${speechClass}">${speechPrimed ? 'primed' : (speechHas ? 'idle' : 'n/a')}</span>`,
        `voices:<span class="${voicesClass}">${voiceCount}</span>`,
      ];
      if (lastBoingAttempt) parts.push(`boing:${lastBoingAttempt}`);
      if (lastSpeakAttempt) parts.push(`spoke:${lastSpeakAttempt}`);
      audioDiag.innerHTML = parts.join(' | ');
    }

    function getAudioCtx() {
      if (sharedAudioCtx) return sharedAudioCtx;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return null;
      try { sharedAudioCtx = new AudioCtx(); } catch (_) { return null; }
      return sharedAudioCtx;
    }

    // iOS Safari requires the AudioContext to be resumed AND to play a real
    // (even silent) buffer inside a user gesture before later scheduled audio
    // plays. `speechSynthesis` similarly needs to be primed in-gesture.
    // Build a valid silent WAV data URI on the fly (0.05s mono 44.1kHz).
    // Used via HTMLAudio on first gesture to upgrade iOS Safari's audio
    // session so WebAudio ignores the physical ringer/silent switch.
    function buildSilentWavDataUri() {
      const samples = 2205; // 0.05s at 44100Hz
      const byteLen = 44 + samples * 2;
      const bytes = new Uint8Array(byteLen);
      const view = new DataView(bytes.buffer);
      view.setUint32(0, 0x52494646, false);
      view.setUint32(4, 36 + samples * 2, true);
      view.setUint32(8, 0x57415645, false);
      view.setUint32(12, 0x666d7420, false);
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, 44100, true);
      view.setUint32(28, 44100 * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      view.setUint32(36, 0x64617461, false);
      view.setUint32(40, samples * 2, true);
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return 'data:audio/wav;base64,' + btoa(bin);
    }
    const SILENT_WAV = buildSilentWavDataUri();
    let silentAudioEl = null;
    let silentPlayed = false;

    function primeSilentAudioSession() {
      if (silentPlayed) return;
      try {
        if (!silentAudioEl) {
          silentAudioEl = new Audio(SILENT_WAV);
          silentAudioEl.loop = false;
          silentAudioEl.preload = 'auto';
          silentAudioEl.muted = false;
          silentAudioEl.volume = 0.01;
        }
        const playPromise = silentAudioEl.play();
        if (playPromise && typeof playPromise.then === 'function') {
          playPromise.then(() => { silentPlayed = true; renderAudioDiag(); }).catch(() => {});
        } else {
          silentPlayed = true;
        }
      } catch (_) {}
    }

    function primeAudio() {
      primeSilentAudioSession();
      const ctx = getAudioCtx();
      if (ctx) {
        if (ctx.state === 'suspended') ctx.resume().then(renderAudioDiag).catch(() => {});
        if (!audioUnlocked) {
          try {
            const buffer = ctx.createBuffer(1, 1, 22050);
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            source.connect(ctx.destination);
            source.start(0);
            audioUnlocked = true;
          } catch (_) {}
        }
      }
      if (!speechPrimed && 'speechSynthesis' in window) {
        try {
          // iOS ignores empty/whitespace warmups — use a real short word
          // at near-silent volume to actually unlock the speech engine.
          const warmup = new SpeechSynthesisUtterance('go');
          warmup.volume = 0.01;
          warmup.rate = 1;
          const v = pickEnglishVoice();
          if (v) warmup.voice = v;
          window.speechSynthesis.speak(warmup);
          speechPrimed = true;
          // Voices populate async on iOS/Chrome; getVoices() triggers load.
          window.speechSynthesis.getVoices();
        } catch (_) {}
      }
      renderAudioDiag();
    }
    if ('speechSynthesis' in window) {
      window.speechSynthesis.addEventListener?.('voiceschanged', renderAudioDiag);
    }
    ['pointerdown', 'touchstart', 'click', 'keydown'].forEach((evt) => {
      window.addEventListener(evt, primeAudio, { capture: true, passive: true });
    });

    function playBoing() {
      if (!soundMode.checked) { lastBoingAttempt = 'muted'; renderAudioDiag(); return; }
      const audioCtx = getAudioCtx();
      if (!audioCtx) { lastBoingAttempt = 'no-ctx'; renderAudioDiag(); return; }
      if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
      try {
        const t = audioCtx.currentTime;
        const duration = 0.45;

        // Carrier: fast exponential pitch drop, the "boing" core
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(780, t);
        osc.frequency.exponentialRampToValueAtTime(95, t + 0.38);

        // Vibrato LFO wobbles the pitch for the cartoon springy feel
        const vibrato = audioCtx.createOscillator();
        const vibratoGain = audioCtx.createGain();
        vibrato.type = 'sine';
        vibrato.frequency.setValueAtTime(22, t);
        vibrato.frequency.exponentialRampToValueAtTime(8, t + duration);
        vibratoGain.gain.setValueAtTime(55, t);
        vibratoGain.gain.exponentialRampToValueAtTime(3, t + duration);
        vibrato.connect(vibratoGain);
        vibratoGain.connect(osc.frequency);

        // Resonant lowpass sweep adds the rubbery "thwong" timbre
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.Q.value = 7;
        filter.frequency.setValueAtTime(2400, t);
        filter.frequency.exponentialRampToValueAtTime(380, t + duration);

        // Quick attack, slower decay
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.4, t + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        vibrato.start(t);
        osc.start(t);
        vibrato.stop(t + duration + 0.02);
        osc.stop(t + duration + 0.02);

        lastBoingAttempt = `ok(${audioCtx.state})`;
      } catch (err) {
        lastBoingAttempt = `err:${(err && err.name) || 'x'}`;
      }
      renderAudioDiag();
    }

    function pickEnglishVoice() {
      if (!('speechSynthesis' in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      if (!voices || voices.length === 0) return null;
      return (
        voices.find((v) => v.lang === 'en-US' && v.default) ||
        voices.find((v) => v.lang === 'en-US') ||
        voices.find((v) => v.lang && v.lang.startsWith('en')) ||
        voices[0]
      );
    }

    function speakNow(text) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = config.narratorRate;
      utter.pitch = config.narratorPitch;
      utter.volume = 1;
      const voice = pickEnglishVoice();
      if (voice) utter.voice = voice;
      utter.addEventListener('start', () => { lastSpeakAttempt = 'started'; renderAudioDiag(); });
      utter.addEventListener('end', () => { lastSpeakAttempt = 'ended'; renderAudioDiag(); });
      utter.addEventListener('error', (e) => { lastSpeakAttempt = `err:${e.error || 'x'}`; renderAudioDiag(); });
      try {
        window.speechSynthesis.speak(utter);
        lastSpeakAttempt = 'queued';
      } catch (err) {
        lastSpeakAttempt = `throw:${(err && err.name) || 'x'}`;
      }
      renderAudioDiag();
    }

    function narrate(text) {
      if (!narratorMode.checked) { lastSpeakAttempt = 'off'; renderAudioDiag(); return; }
      if (!('speechSynthesis' in window)) { lastSpeakAttempt = 'n/a'; renderAudioDiag(); return; }
      try { window.speechSynthesis.resume(); } catch (_) {}
      // iOS Safari has a bug where cancel() immediately followed by speak()
      // leaves the new utterance queued forever. Delay speak() to the next
      // tick so the cancel fully flushes first.
      const speaking = window.speechSynthesis.speaking || window.speechSynthesis.pending;
      if (speaking) {
        window.speechSynthesis.cancel();
        setTimeout(() => speakNow(text), 60);
      } else {
        speakNow(text);
      }
    }

    function burstConfetti() {
      const colors = ['#f5c842', '#ff6b6b', '#64dfdf', '#f78da7', '#c3f584'];
      for (let i = 0; i < 18; i++) {
        const piece = document.createElement('span');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = randomFrom(colors);
        piece.style.animationDelay = `${Math.random() * 0.2}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confettiLayer.appendChild(piece);
        setTimeout(() => piece.remove(), 1500);
      }
    }

    // Build zones
    conclusions.forEach((text, i) => {
      const zone = document.createElement('div');
      zone.className = 'zone';
      zone.dataset.index = i;
      zone.dataset.hit = '';
      zone.textContent = text;
      mat.appendChild(zone);
    });
    updateStatsLine();

    function getZoneLandingPosition(zoneEl) {
      const matRect = mat.getBoundingClientRect();
      const zoneRect = zoneEl.getBoundingClientRect();
      return {
        x: zoneRect.left - matRect.left + 18,
        y: zoneRect.top  - matRect.top  + zoneRect.height - 16,
      };
    }

    function placePerson(zoneEl, animate) {
      const landing = getZoneLandingPosition(zoneEl);
      person.style.left = landing.x + 'px';
      person.style.top  = landing.y + 'px';
      if (animate) {
        person.classList.remove('jumping');
        void person.offsetWidth;
        person.classList.add('jumping');
      }
    }

    function getEligibleLandingZones(zones) {
      const nextTurn = jumpCount + 1;
      return zones.filter((zoneEl) => {
        const index = Number(zoneEl.dataset.index);
        return nextTurn - lastLandedTurnByIndex[index] >= config.tileCooldownTurns;
      });
    }

    function chooseLandingZone(zones) {
      const eligibleZones = getEligibleLandingZones(zones);
      const landingPool = eligibleZones.length > 0 ? eligibleZones : zones;
      const internIndex = 2;

      if (internBiasMode.checked) {
        const internZone = landingPool.find((zoneEl) => Number(zoneEl.dataset.index) === internIndex);
        if (internZone && Math.random() < config.internBiasChance) return internZone;
      }

      return randomFrom(landingPool);
    }

    function setJumpControlsDisabled(disabled) {
      jumpBtn.disabled = disabled;
      autoFiveBtn.disabled = disabled;
    }

    function applyChaosShake() {
      if (!chaosMode.checked) return;
      matWrapper.classList.remove('chaos-shake');
      void matWrapper.offsetWidth;
      matWrapper.classList.add('chaos-shake');
    }

    async function runJump(keepControlsDisabled = false) {
      if (isJumping) return;
      isJumping = true;
      setJumpControlsDisabled(true);

      // Clear previous active
      if (currentZone) currentZone.classList.remove('active');
      conclusionText.classList.remove('visible');

      const zones = Array.from(mat.querySelectorAll('.zone'));
      const landedZone = chooseLandingZone(zones);
      const picked = Number(landedZone.dataset.index);

      // Quick hop animation across random zones before landing
      let hops = 0;
      const totalHops = (chaosMode.checked ? config.hopCountBase + 4 : config.hopCountBase) + Math.floor(Math.random() * 4);

      await new Promise((resolve) => {
        const hopInterval = setInterval(() => {
          const tempZone = randomFrom(zones);
          placePerson(tempZone, hops % 2 === 0);
          hops++;
          if (hops >= totalHops) {
            clearInterval(hopInterval);

            // Final landing
            placePerson(landedZone, true);
            landedZone.classList.add('active');
            currentZone = landedZone;
            jumpCount++;
            lastLandedTurnByIndex[picked] = jumpCount;
            blameCounts[picked] += 1;
            landedZone.dataset.hit = String(blameCounts[picked]);

            const selectedText = conclusions[picked].replace(/\n/g, ' ');
            conclusionLabel.textContent = 'You have concluded:';
            conclusionText.textContent = selectedText;

            playBoing();
            narrate(selectedText);
            applyChaosShake();

            if (Math.random() < config.confettiChance || picked === lastPicked) {
              burstConfetti();
            }
            lastPicked = picked;

            setTimeout(() => {
              conclusionText.classList.add('visible');
              jumpCountEl.textContent = `${jumpCount} conclusion${jumpCount !== 1 ? 's' : ''} jumped to`;
              jumpBtn.textContent = 'JUMP AGAIN!';
              updateStatsLine();
              resolve();
            }, 150);
          }
        }, config.hopIntervalMs);
      });

      isJumping = false;
      if (!keepControlsDisabled) setJumpControlsDisabled(false);
    }

    async function runAutoJumps(times) {
      if (isJumping) return;
      setJumpControlsDisabled(true);
      for (let i = 0; i < times; i++) {
        await runJump(true);
        await new Promise((resolve) => setTimeout(resolve, 180));
      }
      setJumpControlsDisabled(false);
    }

    // Start person on first zone without animation
    window.addEventListener('load', () => {
      const firstZone = mat.querySelector('.zone');
      placePerson(firstZone, false);
    });

    // Keep the avatar aligned to its current tile after resize/orientation changes.
    window.addEventListener('resize', () => {
      const targetZone = currentZone || mat.querySelector('.zone');
      if (targetZone) placePerson(targetZone, false);
    });

    jumpBtn.addEventListener('click', () => {
      runJump(false);
    });

    autoFiveBtn.addEventListener('click', () => {
      runAutoJumps(5);
    });

    resetBtn.addEventListener('click', () => {
      jumpCount = 0;
      lastPicked = -1;
      for (let i = 0; i < conclusions.length; i++) {
        lastLandedTurnByIndex[i] = -Infinity;
        blameCounts[i] = 0;
      }
      mat.querySelectorAll('.zone').forEach((zone) => {
        zone.classList.remove('active');
        zone.dataset.hit = '';
      });
      currentZone = null;
      conclusionLabel.textContent = '';
      conclusionText.textContent = '';
      conclusionText.classList.remove('visible');
      jumpCountEl.textContent = '';
      jumpBtn.textContent = 'JUMP!';
      updateStatsLine();

      const firstZone = mat.querySelector('.zone');
      if (firstZone) placePerson(firstZone, false);
    });

    addCustomBtn.addEventListener('click', () => {
      const customText = customConclusionInput.value.trim();
      if (!customText) return;
      const indexToReplace = Math.floor(Math.random() * conclusions.length);
      conclusions[indexToReplace] = customText;
      const zone = mat.querySelector(`.zone[data-index="${indexToReplace}"]`);
      if (zone) zone.textContent = customText;
      customConclusionInput.value = '';
      updateStatsLine();
      conclusionLabel.textContent = 'Mat mutation:';
      conclusionText.textContent = `Replaced zone ${indexToReplace + 1} with your custom conclusion.`;
      conclusionText.classList.add('visible');
    });

    customConclusionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') addCustomBtn.click();
    });

    function formatConfigValue(key) {
      const spec = CONFIG_SCHEMA[key];
      const raw = config[key];
      if (spec.type === 'int') return String(raw);
      if (spec.type === 'float') return raw.toFixed(spec.decimals ?? 2);
      return raw;
    }

    function renderConfigInputs() {
      for (const [key, spec] of Object.entries(CONFIG_SCHEMA)) {
        const input = document.getElementById(spec.el);
        if (!input) continue;
        input.value = config[key];
        if (spec.value) {
          const label = document.getElementById(spec.value);
          if (label) label.textContent = formatConfigValue(key);
        }
      }
      person.textContent = config.personEmoji;
    }

    function bindConfigInputs() {
      for (const [key, spec] of Object.entries(CONFIG_SCHEMA)) {
        const input = document.getElementById(spec.el);
        if (!input) continue;
        input.addEventListener('input', () => {
          if (spec.type === 'int') {
            config[key] = clamp(Math.round(Number(input.value)), spec.min, spec.max);
          } else if (spec.type === 'float') {
            config[key] = clamp(Number(input.value), spec.min, spec.max);
          } else {
            const trimmed = input.value.slice(0, spec.maxLength);
            config[key] = trimmed.length > 0 ? trimmed : CONFIG_DEFAULTS[key];
          }
          if (spec.value) {
            const label = document.getElementById(spec.value);
            if (label) label.textContent = formatConfigValue(key);
          }
          if (key === 'personEmoji') person.textContent = config.personEmoji;
          saveConfig();
        });
      }
    }

    document.getElementById('restoreDefaultsBtn').addEventListener('click', () => {
      Object.assign(config, CONFIG_DEFAULTS);
      try { localStorage.removeItem(CONFIG_STORAGE_KEY); } catch (_) {}
      renderConfigInputs();
    });

    loadConfig();
    renderConfigInputs();
    bindConfigInputs();
    renderAudioDiag();
  </script>
</body>
</html>
